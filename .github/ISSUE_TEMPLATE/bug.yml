name: Bug Report
description: Report a bug.
type: "Bug"
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Please provide a description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Please provide detailed step-by-step instructions on how to reproduce this issue.
    validations:
      required: true
  - type: textarea
    id: expected-behaviour
    attributes:
      label: Expected behaviour
      description: Please provide a clear a detailed description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Please provide the logs from the launched Wine process. These can be found with `CMD + L` in VineyardMac.
      render: bash
    validations:
      required: true
  - type: input
    id: vineyardmac-version
    attributes:
      label: VineyardMac version
      description: Use the app version, commit, or branch you built from.
    validations:
      required: true
  - type: input
    id: mac-version
    attributes:
      label: macOS version
    validations:
      required: true
  - type: checkboxes
    attributes:
      label: Issue Language
      description: All issues must be written in clear plain English so that all devs are able to read them.
      options:
        - label: Yes my issue is written in English
          required: true
